version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: building_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://admin:password@postgres:5432/building_db
      JWT_SECRET: supersecretkey
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
